<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта! 💐</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Меню-заставка -->
    <div id="splash-screen" class="splash-screen">
        <div class="splash-content">
            <div class="splash-title">
                <h1 class="splash-main-title">С 8 Марта!!!!</h1>
            </div>
            <div class="splash-subtitle">Ты самая лучшаааая</div>
            <button id="next-btn" class="next-button">Далее →</button>
        </div>
    </div>

    <!-- Основной контент -->
    <div id="main-content" class="container" style="display: none;">
        <main class="main-content">
            <section class="heart-cards">
                <h3>Нажми на сердечки ❤️</h3>
                <div class="cards-grid">
                    <div class="heart-card" data-text="Ты самая лучшаааая">
                        <div class="card-inner">
                            <div class="card-front">
                                <div class="heart-icon">
                                    <img src="heart1.png" alt="Heart 1" style="width: 60px; height: 60px;">
                                </div>
                            </div>
                            <div class="card-back">
                                <div class="card-text">Ты самая красииваааая<3</div>
                            </div>
                        </div>
                    </div>
                    <div class="heart-card" data-text="Ты самая красииваааая<3">
                        <div class="card-inner">
                            <div class="card-front">
                                <div class="heart-icon">
                                    <img src="heart2.png" alt="Heart 2" style="width: 60px; height: 60px;">
                                </div>
                            </div>
                            <div class="card-back">
                                <div class="card-text">Анюююта,нююта,анечка</div>
                            </div>
                        </div>
                    </div>
                    <div class="heart-card" data-text="Анюююта,нююта,анечка">
                        <div class="card-inner">
                            <div class="card-front">
                                <div class="heart-icon">
                                    <img src="heart3.png" alt="Heart 3" style="width: 60px; height: 60px;">
                                </div>
                            </div>
                            <div class="card-back">
                                <div class="card-text">яяя всегдааа скучаюю по тебее</div>
                            </div>
                        </div>
                    </div>
                    <div class="heart-card" data-text="яяя всегдааа скучаюю по тебее">
                        <div class="card-inner">
                            <div class="card-front">
                                <div class="heart-icon">
                                    <img src="heart4.png" alt="Heart 4" style="width: 60px; height: 60px;">
                                </div>
                            </div>
                            <div class="card-back">
                                <div class="card-text">С 8 маааартаа</div>
                            </div>
                        </div>
                    </div>
                    <div class="heart-card" data-text="С 8 маааартаа">
                        <div class="card-inner">
                            <div class="card-front">
                                <div class="heart-icon">
                                    <img src="heart5.png" alt="Heart 5" style="width: 60px; height: 60px;">
                                </div>
                            </div>
                            <div class="card-back">
                                <div class="card-text">Ты самая лучшая подруга</div>
                            </div>
                        </div>
                    </div>
                    <div class="heart-card" data-text="Ты самое дорогое сокровище! 💎">
                        <div class="card-inner">
                            <div class="card-front">
                                <div class="heart-icon">
                                    <img src="heart6.png" alt="Heart 6" style="width: 60px; height: 60px;">
                                </div>
                            </div>
                            <div class="card-back">
                                <div class="card-text">Яяя тяяя люю</div>
                            </div>
                        </div>
                    </div>
                </div>
                <button id="next-btn-2" class="next-button-2">Далее →</button>
            </section>
        </main>
    </div>

    <!-- Третий слайд -->
    <div id="third-slide" class="container" style="display: none;">
        <main class="main-content">
            <section class="final-message">
                <div class="message-container">
                    <h2 class="final-title">С праздником, моя любимая!</h2>
                    <p class="final-text" id="typing-text"></p>
                    <div class="signature">С любовью и нежностью ❤️</div>
                    <button id="next-btn-3" class="next-button-3">Далее →</button>
                </div>
                
                <div class="side-image-container">
                    <img src="image1.png" alt="Image 1" class="side-image">
                </div>
                
                <div class="side-image-container-2">
                    <img src="image2.png" alt="Image 2" class="side-image-2">
                </div>
                
                <div class="side-image-container-3">
                    <img src="image3.png" alt="Image 3" class="side-image-3">
                </div>
                
                <div class="side-image-container-4">
                    <img src="image4.png" alt="Image 4" class="side-image-4">
                </div>
            </section>
        </main>
    </div>

    <!-- Четвертый слайд -->
    <div id="fourth-slide" class="container" style="display: none;">
        <main class="main-content">
            <section class="final-message">
                <div class="message-container">
                    <h2 class="final-title">С праздником, моя любимая!</h2>
                    <p class="final-text" id="typing-text-2"></p>
                    <div class="signature">С любовью и нежностью ❤️</div>
                    <button id="next-btn-4" class="next-button-3">Далее →</button>
                </div>
                
                <div class="side-image-container">
                    <img src="image5.png" alt="Image 5" class="side-image">
                </div>
                
                <div class="side-image-container-2">
                    <img src="image6.png" alt="Image 6" class="side-image-2">
                </div>
                
                <div class="side-image-container-3">
                    <img src="image7.png" alt="Image 7" class="side-image-3">
                </div>
                
                <div class="side-image-container-4">
                    <img src="image8.png" alt="Image 8" class="side-image-4">
                </div>
            </section>
        </main>
    </div>

    <!-- Пятый слайд - видео -->
    <div id="fifth-slide" class="container" style="display: none;">
        <main class="main-content">
            <section class="video-section">
                <div class="video-container">
                    <video id="main-video" width="100%" height="100%" autoplay muted>
                        <source src="ggg.mp4" type="video/mp4">
                        Ваш браузер не поддерживает видео.
                    </video>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
